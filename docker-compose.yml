services:
  backend:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    volumes:
      # БД сохраняется на диске сервера, не внутри контейнера
      - sqlite_data:/app/data
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: always
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  sqlite_data: